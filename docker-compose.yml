services:
  backend:
    build: ./backend
    container_name: geo-backend
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/countries"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    container_name: geo-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
