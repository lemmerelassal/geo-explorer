<div class="page-wrapper">
  <h1 class="page-title">Countries</h1>

  @if (loading()) {
    <div class="spinner-wrap"><mat-spinner diameter="40" /></div>
  } @else {
    <mat-nav-list class="country-list">
      @for (country of countries(); track country.id) {
        <mat-list-item (click)="selectCountry(country)">
          <span matListItemTitle>{{ country.name }}</span>
        </mat-list-item>
      }
    </mat-nav-list>
  }
</div>
